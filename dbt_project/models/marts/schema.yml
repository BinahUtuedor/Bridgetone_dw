version: 2

models:
  - name: fct_store_sales
    description: "Fact table containing all store transactions"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - transaction_id
              - product_id

    columns:
      - name: transaction_id
        tests:
          - not_null

      - name: store_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id